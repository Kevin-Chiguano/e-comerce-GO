<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito - E-Commerce</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div class="page-shell">
        <header class="topbar">
            <div class="brand">
                <div class="brand-mark">🛒</div>
                <div>
                    <div>Tu carrito</div>
                    <div class="muted">Resumen de compra en tiempo real</div>
                </div>
            </div>
            <nav class="nav-links">
                <a href="/productos">Productos</a>
                <a href="/pedidos">Mis Pedidos</a>
                <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
            </nav>
        </header>

        <main class="panel" style="margin-top: 24px;">
            <div class="table-shell">
                <table id="carritoTable" style="display:none;">
                    <thead>
                        <tr>
                            <th>Producto</th>
                            <th>Precio</th>
                            <th>Cantidad</th>
                            <th>Subtotal</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="carritoBody"></tbody>
                </table>
            </div>
            <div class="empty-state" id="emptyCart">📭 Tu carrito está vacío</div>

            <div class="summary-card" id="resumenDiv" style="display:none;">
                <h3>Resumen</h3>
                <div class="summary-row summary-total">
                    <span>Total:</span>
                    <span id="total">$0.00</span>
                </div>
                <div class="button-row" style="margin-top: 16px;">
                    <button class="btn btn-primary" onclick="checkout()" style="width: 100%;">✓ Finalizar compra</button>
                    <button class="btn btn-danger" onclick="clearCart()" style="width: 100%;">Vaciar carrito</button>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/js/app.js"></script>
    <script>
        async function loadCarrito() {
            const token = localStorage.getItem('token');
            if (!token) { window.location.href = '/login'; return; }
            try {
                const response = await fetchWithAuth('/api/carrito');
                if (!response) return;
                if (!response.ok) {
                    if (response.status === 401) {
                        window.location.href = '/login';
                        return;
                    }
                    const errorData = await response.json().catch(() => null);
                    alert('Error al cargar el carrito: ' + (errorData?.error || response.statusText));
                    return;
                }

                const carrito = await response.json();

                if (!carrito.detalles || carrito.detalles.length === 0) {
                    document.getElementById('emptyCart').style.display = 'block';
                    document.getElementById('carritoTable').style.display = 'none';
                    document.getElementById('resumenDiv').style.display = 'none';
                    return;
                }

                document.getElementById('emptyCart').style.display = 'none';
                document.getElementById('carritoTable').style.display = 'table';
                document.getElementById('resumenDiv').style.display = 'block';

                const tbody = document.getElementById('carritoBody');
                tbody.innerHTML = '';
                let total = 0;

                carrito.detalles.forEach(item => {
                    const subtotal = item.cantidad * item.producto.precio;
                    total += subtotal;
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td>${item.producto.nombre}</td><td>$${item.producto.precio.toFixed(2)}</td><td>${item.cantidad}</td><td>$${subtotal.toFixed(2)}</td><td><button class="btn btn-danger" onclick="removeFromCart(${item.producto.id})">Remover</button></td>`;
                    tbody.appendChild(tr);
                });

                document.getElementById('total').textContent = `$${total.toFixed(2)}`;
            } catch (error) { alert('Error: ' + error.message); }
        }

        async function removeFromCart(pid) {
            try {
                const response = await fetchWithAuth(`/api/carrito/${pid}`, { method: 'DELETE' });
                if (response && response.ok) loadCarrito();
                else if (response && response.status === 401) window.location.href = '/login';
            } catch (error) { alert('Error: ' + error.message); }
        }

        async function clearCart() {
            if (!confirm('¿Vaciar carrito?')) return;
            try {
                const response = await fetchWithAuth('/api/carrito/clear', { method: 'POST' });
                if (response && response.ok) loadCarrito();
                else if (response && response.status === 401) window.location.href = '/login';
            } catch (error) { alert('Error: ' + error.message); }
        }

        async function checkout() {
            if (!confirm('¿Confirmar compra?')) return;
            try {
                const response = await fetchWithAuth('/api/pedidos', { method: 'POST' });
                if (!response) return;
                const data = await response.json();
                if (response.ok) {
                    alert('✓ ¡Pedido realizado!\nID: ' + data.pedido.id);
                    window.location.href = '/pedidos';
                } else {
                    alert('Error: ' + (data.error || response.statusText));
                    if (response.status === 401) window.location.href = '/login';
                }
            } catch (error) { alert('Error: ' + error.message); }
        }

        function logout() { localStorage.clear(); window.location.href = '/login'; }

        loadCarrito();
    </script>
</body>
</html>
