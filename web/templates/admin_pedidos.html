<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos - Admin</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div class="page-shell">
        <header class="topbar">
            <div class="brand">
                <div class="brand-mark">🧾</div>
                <div>
                    <div>Pedidos pendientes</div>
                    <div class="muted">Aprobación y seguimiento de compras</div>
                </div>
            </div>
            <nav class="nav-links">
                <a href="/admin/productos/nuevo">➕ Agregar producto</a>
                <a href="/admin/productos">Administrar productos</a>
                <a href="/productos">Ver tienda</a>
                <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
            </nav>
        </header>

        <main class="panel" style="margin-top: 24px;">
            <div class="table-shell">
                <table id="pedidosTable" style="display:none;">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Usuario</th>
                            <th>Fecha</th>
                            <th>Total</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="pedidosBody"></tbody>
                </table>
            </div>
            <div class="empty-state" id="emptyPedidos">📭 No hay pedidos aún</div>
        </main>
    </div>

    <script>
        async function loadPedidos() {
            if (localStorage.getItem('rol_id') !== '1') { window.location.href = '/login'; return; }
            try {
                const response = await fetch('/api/admin/pedidos', { headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` } });
                const data = await response.json();
                const pedidos = data.pedidos || [];

                if (!pedidos.length) {
                    document.getElementById('emptyPedidos').style.display = 'block';
                    document.getElementById('pedidosTable').style.display = 'none';
                    return;
                }

                document.getElementById('emptyPedidos').style.display = 'none';
                document.getElementById('pedidosTable').style.display = 'table';

                const tbody = document.getElementById('pedidosBody');
                tbody.innerHTML = '';

                pedidos.forEach(p => {
                    const tr = document.createElement('tr');
                    const fecha = new Date(p.fecha).toLocaleDateString();
                    const estado = (p.estado || 'PENDIENTE').toLowerCase();
                    tr.innerHTML = `
                        <td>#${p.id}</td>
                        <td>${p.usuario_id}</td>
                        <td>${fecha}</td>
                        <td>$${p.total.toFixed(2)}</td>
                        <td><span class="status-pill ${estado}">${p.estado || 'PENDIENTE'}</span></td>
                        <td>${p.estado === 'PENDIENTE' ? `<button class="btn btn-success" onclick="aprobarPedido(${p.id})">Aprobar</button>` : ''}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        async function aprobarPedido(id) {
            if (!confirm('¿Aprobar este pedido?')) return;
            try {
                const response = await fetch(`/api/admin/pedidos/${id}/aprobar`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                if (response.ok) {
                    alert('Pedido aprobado correctamente');
                    loadPedidos();
                } else {
                    const body = await response.json();
                    alert('Error: ' + (body.error || response.statusText));
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        function logout() { localStorage.clear(); window.location.href = '/login'; }

        loadPedidos();
    </script>
</body>
</html>
