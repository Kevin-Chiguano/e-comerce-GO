<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Producto - Admin</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div class="page-shell">
        <header class="topbar">
            <div class="brand">
                <div class="brand-mark">⚙️</div>
                <div>
                    <div>Panel de administración</div>
                    <div class="muted">Editar producto</div>
                </div>
            </div>
            <nav class="nav-links">
                <a href="/admin/productos">← Volver a productos</a>
                <a href="/admin/productos/nuevo">Agregar producto</a>
                <a href="/admin/pedidos">Pedidos</a>
                <a href="/productos">Ver tienda</a>
                <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
            </nav>
        </header>

        <main class="panel" style="margin-top: 24px; max-width: 720px; margin-left: auto; margin-right: auto;">
            <div class="auth-card">
                <h1>✏️ Editar Producto</h1>
                <p class="muted">Actualiza información del producto y ajusta su stock.</p>
                <form id="productoForm" style="margin-top: 20px;">
                    <div class="form-group">
                        <label for="nombre">Nombre</label>
                        <input type="text" id="nombre" required>
                    </div>
                    <div class="form-group">
                        <label for="descripcion">Descripción</label>
                        <textarea id="descripcion" required rows="4"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="precio">Precio</label>
                        <input type="number" id="precio" required step="0.01">
                    </div>
                    <div class="form-group">
                        <label for="stock">Stock</label>
                        <input type="number" id="stock" required>
                    </div>
                    <div class="form-group">
                        <label for="categoria_id">Categoría ID</label>
                        <input type="number" id="categoria_id" required>
                    </div>
                    <div class="form-group">
                        <label for="imagen">URL Imagen</label>
                        <input type="text" id="imagen">
                    </div>
                    <div class="button-row">
                        <button type="submit" class="btn btn-success">✓ Guardar cambios</button>
                        <button type="button" class="btn btn-warning" onclick="adjustStock()">📦 Ajustar stock</button>
                        <button type="button" class="btn btn-secondary" onclick="window.location.href = '/admin/productos'">Cancelar</button>
                    </div>
                    <div class="error" id="error"></div>
                    <div class="success" id="success"></div>
                </form>
            </div>
        </main>
    </div>

    <script>
        if (localStorage.getItem('rol_id') !== '1') { window.location.href = '/login'; }

        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        async function loadProducto() {
            try {
                const response = await fetch(`/api/productos/${id}`);
                const p = await response.json();
                document.getElementById('nombre').value = p.nombre;
                document.getElementById('descripcion').value = p.descripcion;
                document.getElementById('precio').value = p.precio;
                document.getElementById('stock').value = p.stock;
                document.getElementById('categoria_id').value = p.categoria_id;
                document.getElementById('imagen').value = p.imagen || '';
            } catch (error) { alert('Error cargando producto: ' + error.message); }
        }

        document.getElementById('productoForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const producto = {
                nombre: document.getElementById('nombre').value,
                descripcion: document.getElementById('descripcion').value,
                precio: parseFloat(document.getElementById('precio').value),
                stock: parseInt(document.getElementById('stock').value),
                categoria_id: parseInt(document.getElementById('categoria_id').value),
                imagen: document.getElementById('imagen').value
            };

            try {
                const response = await fetch(`/api/productos/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                    body: JSON.stringify(producto)
                });

                const data = await response.json();
                if (response.ok) {
                    document.getElementById('success').textContent = '✓ Producto actualizado';
                    document.getElementById('success').style.display = 'block';
                    setTimeout(() => window.location.href = '/admin/productos', 1500);
                } else {
                    document.getElementById('error').textContent = '✗ ' + (data.error || 'Error');
                    document.getElementById('error').style.display = 'block';
                }
            } catch (error) {
                document.getElementById('error').textContent = '✗ Error: ' + error.message;
                document.getElementById('error').style.display = 'block';
            }
        });

        async function adjustStock() {
            const cantidad = prompt('Ingresa cantidad (positiva para agregar, negativa para restar):');
            if (!cantidad) return;

            try {
                const response = await fetch(`/api/productos/${id}/stock`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                    body: JSON.stringify({ cantidad: parseInt(cantidad) })
                });

                if (response.ok) {
                    alert('✓ Stock actualizado');
                    loadProducto();
                } else {
                    alert('Error actualizando stock');
                }
            } catch (error) { alert('Error: ' + error.message); }
        }

        loadProducto();
    </script>
</body>
</html>
