<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Pedidos - E-Commerce</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div class="page-shell">
        <header class="topbar">
            <div class="brand">
                <div class="brand-mark">📋</div>
                <div>
                    <div>Mis pedidos</div>
                    <div class="muted">Historial y estado de tus compras</div>
                </div>
            </div>
            <nav class="nav-links">
                <a href="/productos">Productos</a>
                <a id="navActionLink" href="/carrito">🛒 Carrito</a>
                <a id="navAdminPanelLink" href="/admin/productos" style="display:none">🛠️ Administrar productos</a>
                <a id="navAdminOrdersLink" href="/admin/pedidos" style="display:none">🧾 Pedidos admin</a>
                <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
            </nav>
        </header>

        <main class="panel" style="margin-top: 24px;">
            <div class="table-shell">
                <table id="pedidosTable" style="display:none;">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Fecha</th>
                            <th>Total</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody id="pedidosBody"></tbody>
                </table>
            </div>
            <div class="empty-state" id="emptyPedidos">📭 No tienes pedidos aún</div>
        </main>
    </div>

    <script>
        function updateNavForRole() {
            const rol = localStorage.getItem('rol_id');
            const actionLink = document.getElementById('navActionLink');
            const adminPanelLink = document.getElementById('navAdminPanelLink');
            const adminOrdersLink = document.getElementById('navAdminOrdersLink');
            if (!actionLink || !adminPanelLink || !adminOrdersLink) return;

            if (rol === '1') {
                actionLink.textContent = '➕ Agregar producto';
                actionLink.href = '/admin/productos/nuevo';
                adminPanelLink.style.display = 'inline-block';
                adminOrdersLink.style.display = 'inline-block';
            } else {
                actionLink.textContent = '🛒 Carrito';
                actionLink.href = '/carrito';
                adminPanelLink.style.display = 'none';
                adminOrdersLink.style.display = 'none';
            }
        }

        async function loadPedidos() {
            if (!localStorage.getItem('token')) { window.location.href = '/login'; return; }
            updateNavForRole();
            try {
                const response = await fetch('/api/pedidos', { headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` } });
                const data = await response.json();
                const pedidos = data.pedidos || [];

                if (!pedidos || pedidos.length === 0) {
                    document.getElementById('emptyPedidos').style.display = 'block';
                    document.getElementById('pedidosTable').style.display = 'none';
                    return;
                }

                document.getElementById('emptyPedidos').style.display = 'none';
                document.getElementById('pedidosTable').style.display = 'table';

                const tbody = document.getElementById('pedidosBody');
                tbody.innerHTML = '';

                pedidos.forEach(p => {
                    const tr = document.createElement('tr');
                    const fecha = new Date(p.fecha).toLocaleDateString();
                    const estado = (p.estado || 'PENDIENTE').toLowerCase();
                    tr.innerHTML = `
                        <td>#${p.id}</td>
                        <td>${fecha}</td>
                        <td>$${p.total.toFixed(2)}</td>
                        <td><span class="status-pill ${estado}">${p.estado || 'PENDIENTE'}</span></td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) { alert('Error: ' + error.message); }
        }

        function logout() { localStorage.clear(); window.location.href = '/login'; }

        loadPedidos();
    </script>
</body>
</html>
