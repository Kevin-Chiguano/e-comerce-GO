<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - E-Commerce</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 400px; }
        h1 { color: #333; margin-bottom: 30px; text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #555; font-weight: 500; }
        input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 5px; font-size: 16px; transition: border-color 0.3s; }
        input:focus { outline: none; border-color: #667eea; }
        button { width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; transition: transform 0.2s; }
        button:hover { transform: translateY(-2px); }
        .error { color: #e74c3c; margin-top: 10px; padding: 10px; background: #fadbd8; border-radius: 5px; display: none; }
        .success { color: #27ae60; margin-top: 10px; padding: 10px; background: #d5f4e6; border-radius: 5px; display: none; }
        .link { text-align: center; margin-top: 20px; }
        .link a { color: #667eea; text-decoration: none; }
        .link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Iniciar Sesión</h1>
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required placeholder="tu@email.com">
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit">Iniciar Sesión</button>
            <div class="error" id="error"></div>
            <div class="success" id="success"></div>
        </form>
        <div class="link">
            ¿No tienes cuenta? <a href="/registro">Regístrate aquí</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');
            const successDiv = document.getElementById('success');

            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    
                    // Decodificar JWT para obtener rol
                    const payload = JSON.parse(atob(data.token.split('.')[1]));
                    localStorage.setItem('user_id', payload.user_id);
                    localStorage.setItem('rol_id', payload.rol_id);
                    localStorage.setItem('email', payload.email);

                    successDiv.textContent = '✓ Login exitoso. Redirigiendo...';
                    successDiv.style.display = 'block';

                    // Redirigir según rol
                    setTimeout(() => {
                        if (payload.rol_id === 1) {
                            window.location.href = '/admin/productos';
                        } else {
                            window.location.href = '/productos';
                        }
                    }, 1500);
                } else {
                    errorDiv.textContent = '✗ ' + (data.error || 'Login fallido');
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = '✗ Error de conexión: ' + error.message;
                errorDiv.style.display = 'block';
            }
        });

        // Si ya está logueado, redirigir
        if (localStorage.getItem('token')) {
            const rolId = localStorage.getItem('rol_id');
            if (rolId === '1') {
                window.location.href = '/admin/productos';
            } else {
                window.location.href = '/productos';
            }
        }
    </script>
</body>
</html>
