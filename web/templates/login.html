<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - E-Commerce</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div class="auth-shell">
        <div class="auth-card">
            <h1>🔐 Iniciar Sesión</h1>
            <p class="muted">Accede a tu cuenta y continúa con tu experiencia NovaStore.</p>
            <form id="loginForm" style="margin-top: 20px;">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="tu@email.com">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Iniciar Sesión</button>
                <div class="error" id="error"></div>
                <div class="success" id="success"></div>
            </form>
            <div class="link">
                ¿No tienes cuenta? <a href="/registro">Regístrate aquí</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');
            const successDiv = document.getElementById('success');

            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    const payload = JSON.parse(atob(data.token.split('.')[1]));
                    localStorage.setItem('user_id', payload.user_id);
                    localStorage.setItem('rol_id', payload.rol_id);
                    localStorage.setItem('email', payload.email);

                    successDiv.textContent = '✓ Login exitoso. Redirigiendo...';
                    successDiv.style.display = 'block';

                    setTimeout(() => {
                        if (payload.rol_id === 1) {
                            window.location.href = '/admin/productos';
                        } else {
                            window.location.href = '/productos';
                        }
                    }, 1500);
                } else {
                    errorDiv.textContent = '✗ ' + (data.error || 'Login fallido');
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = '✗ Error de conexión: ' + error.message;
                errorDiv.style.display = 'block';
            }
        });

        if (localStorage.getItem('token')) {
            const rolId = localStorage.getItem('rol_id');
            window.location.href = rolId === '1' ? '/admin/productos' : '/productos';
        }
    </script>
</body>
</html>
