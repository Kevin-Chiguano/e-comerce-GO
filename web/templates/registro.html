<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - E-Commerce</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div class="auth-shell">
        <div class="auth-card">
            <h1>📝 Crear Cuenta</h1>
            <p class="muted">Únete a NovaStore y empieza a descubrir productos con una experiencia premium.</p>
            <form id="registerForm" style="margin-top: 20px;">
                <div class="form-group">
                    <label for="nombre">Nombre Completo</label>
                    <input type="text" id="nombre" required placeholder="Tu nombre">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="tu@email.com">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Registrarse</button>
                <div class="error" id="error"></div>
                <div class="success" id="success"></div>
            </form>
            <div class="link">
                ¿Ya tienes cuenta? <a href="/login">Inicia Sesión</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nombre = document.getElementById('nombre').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');
            const successDiv = document.getElementById('success');
            
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre, email, password, rol_id: 2 })
                });

                const data = await response.json();

                if (response.ok) {
                    successDiv.textContent = '✓ Registro exitoso. Redirigiendo a login...';
                    successDiv.style.display = 'block';
                    setTimeout(() => window.location.href = '/login', 2000);
                } else {
                    errorDiv.textContent = '✗ ' + (data.error || 'Error en registro');
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = '✗ Error: ' + error.message;
                errorDiv.style.display = 'block';
            }
        });

        if (localStorage.getItem('token')) {
            window.location.href = localStorage.getItem('rol_id') === '1' ? '/admin/productos' : '/productos';
        }
    </script>
</body>
</html>
