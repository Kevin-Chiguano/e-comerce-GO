<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos - E-Commerce</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div class="page-shell">
        <header class="topbar">
            <div class="brand">
                <div class="brand-mark">🛍️</div>
                <div>
                    <div>Catálogo NovaStore</div>
                    <div class="muted">Productos seleccionados para tu próxima compra</div>
                </div>
            </div>
            <nav class="nav-links">
                <a href="/productos">Productos</a>
                <a id="navActionLink" href="/carrito">🛒 Carrito</a>
                <a id="navAdminPanelLink" href="/admin/productos" style="display:none">🛠️ Administrar productos</a>
                <a id="navAdminOrdersLink" href="/admin/pedidos" style="display:none">🧾 Pedidos admin</a>
                <a href="/pedidos">📋 Mis Pedidos</a>
                <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
            </nav>
        </header>

        <main class="panel" style="margin-top: 24px;">
            <div id="error" class="error"></div>
            <div class="productos-container" id="productos-list"></div>
        </main>
    </div>

    <script>
        function updateNavForRole() {
            const rol = localStorage.getItem('rol_id');
            const actionLink = document.getElementById('navActionLink');
            const adminPanelLink = document.getElementById('navAdminPanelLink');
            const adminOrdersLink = document.getElementById('navAdminOrdersLink');
            if (!actionLink || !adminPanelLink || !adminOrdersLink) return;

            if (rol === '1') {
                actionLink.textContent = '➕ Agregar producto';
                actionLink.href = '/admin/productos/nuevo';
                adminPanelLink.style.display = 'inline-block';
                adminOrdersLink.style.display = 'inline-block';
            } else {
                actionLink.textContent = '🛒 Carrito';
                actionLink.href = '/carrito';
                adminPanelLink.style.display = 'none';
                adminOrdersLink.style.display = 'none';
            }
        }

        async function loadProductos() {
            if (!localStorage.getItem('token')) { window.location.href = '/login'; return; }
            updateNavForRole();
            try {
                const response = await fetch('/api/productos');
                const productos = await response.json();
                const container = document.getElementById('productos-list');
                container.innerHTML = '';

                if (!Array.isArray(productos)) {
                    document.getElementById('error').textContent = 'Error cargando productos';
                    document.getElementById('error').style.display = 'block';
                    return;
                }

                productos.forEach(p => {
                    const div = document.createElement('div');
                    div.className = 'producto';
                    const img = p.imagen || 'https://via.placeholder.com/250x200?text=Sin+imagen';
                    div.innerHTML = `
                        <img src="${img}" alt="${p.nombre}">
                        <div>
                            <h3>${p.nombre}</h3>
                            <p class="muted">${(p.descripcion || '').substring(0, 70)}${(p.descripcion || '').length > 70 ? '...' : ''}</p>
                            <div class="precio">$${p.precio.toFixed(2)}</div>
                            <div class="stock ${p.stock <= 5 ? 'bajo' : ''}">Stock: ${p.stock}</div>
                            <button class="btn btn-primary" style="width: 100%;" onclick="addToCart(${p.id}, '${p.nombre}')" ${p.stock <= 0 ? 'disabled' : ''}>Agregar al carrito</button>
                        </div>
                    `;
                    container.appendChild(div);
                });
            } catch (error) {
                document.getElementById('error').textContent = 'Error: ' + error.message;
                document.getElementById('error').style.display = 'block';
            }
        }

        async function addToCart(id, nombre) {
            try {
                const response = await fetch('/api/carrito', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                    body: JSON.stringify({ producto_id: id, cantidad: 1 })
                });
                if (response.ok) alert(`✓ ${nombre} agregado al carrito`);
                else alert('Error');
            } catch (error) { alert('Error: ' + error.message); }
        }

        function logout() { localStorage.clear(); window.location.href = '/login'; }

        loadProductos();
    </script>
</body>
</html>
