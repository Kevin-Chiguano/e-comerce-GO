<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Producto - Admin</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div class="page-shell">
        <header class="topbar">
            <div class="brand">
                <div class="brand-mark">⚙️</div>
                <div>
                    <div>Panel de administración</div>
                    <div class="muted">Crear nuevo producto</div>
                </div>
            </div>
            <nav class="nav-links">
                <a href="/admin/productos">← Volver a productos</a>
                <a href="/admin/pedidos">Pedidos</a>
                <a href="/productos">Ver tienda</a>
                <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
            </nav>
        </header>

        <main class="panel" style="margin-top: 24px; max-width: 720px; margin-left: auto; margin-right: auto;">
            <div class="auth-card">
                <h1>➕ Crear Nuevo Producto</h1>
                <p class="muted">Añade un producto al catálogo con detalles, precio y stock.</p>
                <form id="productoForm" style="margin-top: 20px;">
                    <div class="form-group">
                        <label for="nombre">Nombre</label>
                        <input type="text" id="nombre" required placeholder="Nombre del producto">
                    </div>
                    <div class="form-group">
                        <label for="descripcion">Descripción</label>
                        <textarea id="descripcion" required placeholder="Descripción..." rows="4"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="precio">Precio</label>
                        <input type="number" id="precio" required placeholder="0.00" step="0.01">
                    </div>
                    <div class="form-group">
                        <label for="stock">Stock</label>
                        <input type="number" id="stock" required placeholder="0">
                    </div>
                    <div class="form-group">
                        <label for="categoria_id">Categoría ID</label>
                        <input type="number" id="categoria_id" required placeholder="1">
                    </div>
                    <div class="form-group">
                        <label for="imagen">URL Imagen</label>
                        <input type="text" id="imagen" placeholder="https://...">
                    </div>
                    <div class="button-row">
                        <button type="submit" class="btn btn-success">✓ Guardar</button>
                        <button type="button" class="btn btn-secondary" onclick="window.location.href = '/admin/productos'">Cancelar</button>
                    </div>
                    <div class="error" id="error"></div>
                    <div class="success" id="success"></div>
                </form>
            </div>
        </main>
    </div>

    <script>
        if (localStorage.getItem('rol_id') !== '1') { window.location.href = '/login'; }

        document.getElementById('productoForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const producto = {
                nombre: document.getElementById('nombre').value,
                descripcion: document.getElementById('descripcion').value,
                precio: parseFloat(document.getElementById('precio').value),
                stock: parseInt(document.getElementById('stock').value),
                categoria_id: parseInt(document.getElementById('categoria_id').value),
                imagen: document.getElementById('imagen').value
            };

            try {
                const response = await fetch('/api/productos', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                    body: JSON.stringify(producto)
                });

                const data = await response.json();
                if (response.ok) {
                    document.getElementById('success').textContent = '✓ Producto creado. Redirigiendo...';
                    document.getElementById('success').style.display = 'block';
                    setTimeout(() => window.location.href = '/admin/productos', 2000);
                } else {
                    document.getElementById('error').textContent = '✗ ' + (data.error || 'Error creando producto');
                    document.getElementById('error').style.display = 'block';
                }
            } catch (error) {
                document.getElementById('error').textContent = '✗ Error: ' + error.message;
                document.getElementById('error').style.display = 'block';
            }
        });
    </script>
</body>
</html>
