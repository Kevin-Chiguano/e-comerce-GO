<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Productos - Admin</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div class="page-shell">
        <header class="topbar">
            <div class="brand">
                <div class="brand-mark">⚙️</div>
                <div>
                    <div>Panel de administración</div>
                    <div class="muted">Gestiona catálogo, stock y pedidos</div>
                </div>
            </div>
            <nav class="nav-links">
                <a href="/admin/productos/nuevo">➕ Agregar producto</a>
                <a href="/admin/pedidos">Gestionar pedidos</a>
                <a href="/productos">Ver tienda</a>
                <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
            </nav>
        </header>

        <main class="panel" style="margin-top: 24px;">
            <a href="/admin/productos/nuevo" class="btn btn-success" style="margin-bottom: 16px;">+ Crear nuevo producto</a>
            <div class="table-shell">
                <table id="productosTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Precio</th>
                            <th>Stock</th>
                            <th>Categoría</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="productosBody"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        async function loadProductos() {
            if (localStorage.getItem('rol_id') !== '1') { window.location.href = '/login'; return; }
            try {
                const response = await fetch('/api/productos');
                const productos = await response.json();
                const tbody = document.getElementById('productosBody');
                tbody.innerHTML = '';

                if (!Array.isArray(productos)) return;

                productos.forEach(p => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>#${p.id}</td>
                        <td>${p.nombre}</td>
                        <td>$${p.precio.toFixed(2)}</td>
                        <td>${p.stock}</td>
                        <td>${p.categoria_id}</td>
                        <td>
                            <a href="/admin/productos/editar?id=${p.id}" class="btn btn-secondary">Editar</a>
                            <button class="btn btn-warning" onclick="editStock(${p.id})">Stock</button>
                            <button class="btn btn-danger" onclick="deleteProducto(${p.id})">Eliminar</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) { alert('Error: ' + error.message); }
        }

        async function editStock(id) {
            const cantidad = prompt('Ingresa la cantidad a agregar/restar:');
            if (!cantidad) return;

            try {
                const response = await fetch(`/api/productos/${id}/stock`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                    body: JSON.stringify({ cantidad: parseInt(cantidad) })
                });

                if (response.ok) { alert('✓ Stock actualizado'); loadProductos(); }
                else alert('Error actualizando stock');
            } catch (error) { alert('Error: ' + error.message); }
        }

        async function deleteProducto(id) {
            if (!confirm('¿Eliminar este producto?')) return;

            try {
                const response = await fetch(`/api/productos/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });

                if (response.ok) { alert('✓ Producto eliminado'); loadProductos(); }
                else alert('Error eliminando producto');
            } catch (error) { alert('Error: ' + error.message); }
        }

        function logout() { localStorage.clear(); window.location.href = '/login'; }

        loadProductos();
    </script>
</body>
</html>
